              if (expBtn) {
                expBtn.setAttribute("aria-expanded", String(open));
                expBtn.textContent = open ? "Hide" : "Show";
              }
              if (open) {
                const first = card.querySelector(
                  ".expanded input, .expanded select, .expanded button"
                );
                if (first && typeof first.focus === "function") first.focus();
              }
            });

            grid.appendChild(card);

            // wire up inputs/selections after the element exists
            // clearance select
            if (isClearance) {
              const cs = card.querySelector(".clearance-select");
              if (cs) {
                cs.addEventListener("change", function () {
                  fd.ClearanceType = cs.value;
                  applyFilters();
                });
              }
            }
            // status select
            const statusSel = card.querySelector(".status-select");
            if (statusSel) {
              statusSel.addEventListener("change", function () {
                fd.c_status = statusSel.value;
                // if status became 'Approved' set CompletedOn if missing
                if (
                  (fd.c_status || "").toLowerCase().indexOf("approve") === 0 ||
                  (fd.c_status || "").toLowerCase().indexOf("complete") === 0
                ) {
                  if (!fd.CompletedOn)
                    fd.CompletedOn = new Date().toISOString();
                }
                applyFilters();
              });
            }

            // request upload
            const reqInput = card.querySelector(".req-upload");
            if (reqInput) {
              reqInput.addEventListener("change", function (ev) {
                const fsel = ev.target.files && ev.target.files[0];
                if (fsel) {
                  fd.RequestUploadName = fsel.name;
                  fd.requestUploadAt = new Date().toISOString();
                }
                // re-render current filtered view
                applyFilters();
              });
            }

            // response upload
            const respInput = card.querySelector(".resp-upload");
            if (respInput) {
              respInput.addEventListener("change", function (ev) {
                const fsel = ev.target.files && ev.target.files[0];
                if (fsel) {
                  fd.ResponseUploadName = fsel.name;
                  fd.responseUploadAt = new Date().toISOString();
                }
                applyFilters();
              });
            }
          }
          // update wheel to reflect the currently rendered list
          drawStatusWheel(list);
          // update tasks card based on the currently rendered list
          updateTasks(list);
          // update KPI to show currently visible/filtered count
          kpiTotal.textContent = list.length;
          statusEl.textContent = `Showing ${list.length} of ${items.length} requests.`;
          statusEl.className = "statusline ok";
        }

        // -----------------------
        // Filtering: build a filtered list from inputs and selected wheel status
        function applyFilters() {
          const term = lc(q.value),
            t = fType.value,
            rcv = fRecip.value,
            out = [];
          for (let k = 0; k < items.length; k++) {
            const x = items[k],
              fx = x.fieldData || {};
            if (t && es(fx["Request Type"]) !== t) continue;
            if (rcv && es(fx.recipientName) !== rcv) continue;
            // status filter from wheel (if selected)
            if (typeof selectedStatusKey !== "undefined" && selectedStatusKey) {
              const sKey = statusKeyForString(fx.c_status || "");
              if (sKey !== selectedStatusKey) continue;
            }
            if (!term) {
              out.push(x);
              continue;
            }
            const hay = (
              es(fx["Request Type"]) +
              " " +
              es(fx.recipientName) +
              " " +
              es(fx.c_status)
            ).toLowerCase();
            if (hay.indexOf(term) >= 0) out.push(x);
          }
          try {
            render(out);
          } catch (err) {
            console.error("render failed", err);
            // show a helpful status in the UI and attempt to fallback
            try {
              statusEl.textContent =
                "Render error: " +
                (err && err.message ? err.message : String(err));
              statusEl.className = "statusline err";
              grid.innerHTML = "";
              updateTasks([]);
              kpiTotal.textContent = items.length || 0;
            } catch (_) {}
          }
        }

        if (items.length) {
          render(items);
        } else {
          statusEl.textContent = "No records found";
          statusEl.className = "statusline err";
        }
        q.addEventListener("input", applyFilters);
        fType.addEventListener("change", applyFilters);
        fRecip.addEventListener("change", applyFilters);
        // topbar toggle wiring (mobile)
        const topbarToggle = document.getElementById("topbarToggle");
        if (topbarToggle) {
          topbarToggle.addEventListener("click", function () {
            const tb = document.querySelector(".topbar");
            const open = tb.classList.toggle("open");
            topbarToggle.setAttribute("aria-expanded", String(open));
          });
        }
      })();
    </script>
  </body>
</html>
